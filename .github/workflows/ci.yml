name: CI Pipeline - Fullstack Diet App

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]

jobs:
  # ── Cloud Functions (build + TypeScript) ──────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./functions
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install & Build Functions
        run: |
          npm ci
          npm run build

  # ── Mobile (tests + TypeScript) ────────────────────────────────────────────
  build-mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx jest --no-watchAll --no-coverage --ci

  # ── Deploy (somente em push na main) ─────────────────────────────────────
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: [build-backend, build-mobile]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install & Build Functions
        working-directory: functions
        run: |
          npm ci
          npm run build

      - name: Deploy Firestore Rules, Indexes & Functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore,functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

