name: CI Pipeline - Fullstack Diet App

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        
    - name: Install & Generate Prisma (Backend)
      working-directory: ./backend
      run: |
        npm install
        npx prisma generate
        npx tsc --noEmit

  build-mobile:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        
    - name: Typecheck Mobile (React Native)
      working-directory: ./mobile
      run: |
        npm install --legacy-peer-deps
        npx tsc --noEmit
